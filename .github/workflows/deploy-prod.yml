name: Deploy Prod (Oracle Cloud)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: false
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@v1
        env:
          # Passed as a value (not interpolated into the script text) to avoid
          # template-injection; forwarded to the remote shell via `envs` below.
          REF: ${{ github.event.inputs.ref }}
        with:
          host: ${{ secrets.OC_SSH_HOST }}
          username: ${{ secrets.OC_SSH_USER }}
          key: ${{ secrets.OC_SSH_KEY }}
          envs: REF
          script: |
            set -euo pipefail
            # Reject anything that isn't a plain git ref before it reaches a shell.
            if ! printf '%s' "$REF" | grep -qE '^[A-Za-z0-9._/-]+$'; then
              echo "Refusing to deploy unsafe ref: $REF" >&2
              exit 1
            fi
            # /opt/underway is owned by the `underway` user, which also runs the
            # service. Build and migrate AS that user (ref passed as $1); the ssh
            # user `ubuntu` only holds sudo rights to switch users and restart.
            sudo -u underway -H bash -s "$REF" <<'DEPLOY'
            set -euo pipefail
            REF="$1"
            export PATH="$HOME/.local/bin:$PATH"
            cd /opt/underway
            git fetch origin
            git checkout "$REF"
            git pull --ff-only origin "$REF"

            cd backend
            poetry install --no-interaction --no-ansi
            poetry run alembic upgrade head

            cd ../frontend
            npm ci
            npm run build
            DEPLOY

            sudo systemctl restart underway
            sudo systemctl reload nginx

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OC_SSH_HOST }}
          username: ${{ secrets.OC_SSH_USER }}
          key: ${{ secrets.OC_SSH_KEY }}
          script: |
            # Poll until the service is back up — a restart takes ~10s, so a
            # single fixed sleep races the app's startup and false-fails.
            for i in $(seq 1 30); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/health || true)
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (HTTP 200) after ${i} attempt(s)"
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed (last status: ${STATUS:-none})" >&2
            exit 1
