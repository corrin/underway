name: Deploy Prod (Oracle Cloud)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: false
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OC_SSH_HOST }}
          username: ${{ secrets.OC_SSH_USER }}
          key: ${{ secrets.OC_SSH_KEY }}
          script: |
            set -euo pipefail
            # /opt/underway is owned by the `underway` user, which also runs the
            # service. Build and migrate AS that user; the ssh user `ubuntu` only
            # holds the sudo rights to switch users and restart services.
            sudo -u underway -H bash -s <<'DEPLOY'
            set -euo pipefail
            export PATH="$HOME/.local/bin:$PATH"
            cd /opt/underway
            git fetch origin
            git checkout ${{ github.event.inputs.ref }}
            git pull --ff-only origin ${{ github.event.inputs.ref }}

            cd backend
            poetry install --no-interaction --no-ansi
            poetry run alembic upgrade head

            cd ../frontend
            npm ci
            npm run build
            DEPLOY

            sudo systemctl restart underway
            sudo systemctl reload nginx

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OC_SSH_HOST }}
          username: ${{ secrets.OC_SSH_USER }}
          key: ${{ secrets.OC_SSH_KEY }}
          script: |
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/health)
            if [ "$STATUS" -ne 200 ]; then
              echo "Health check failed with status $STATUS"
              exit 1
            fi
            echo "Health check passed (HTTP $STATUS)"
