name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: aligned_test
          MARIADB_USER: aligned
          MARIADB_PASSWORD: aligned-ci-pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pipx install poetry
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-
      - name: Install dependencies
        run: poetry install
      - name: mypy
        run: poetry run mypy aligned --strict
      - name: ruff check
        run: poetry run ruff check aligned
      - name: ruff format
        run: poetry run ruff format --check aligned
      - name: pytest
        run: poetry run pytest -v
        env:
          TEST_DATABASE_URL: mysql+aiomysql://aligned:aligned-ci-pass@127.0.0.1:3306/aligned_test
          JWT_SECRET_KEY: test-secret

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx vue-tsc --build
      - name: Build
        run: npm run build
